# confgate research graph — standalone Neo4j (SPEC v1.2 Phase 0).
# Zero coupling to topo's :7688 or link-forge's :7687. Own CF-/CH-/CG-FE namespace.
# Explicit project name isolates this stack so `down --remove-orphans` can never
# touch topo's `topo-research-graph` container.
name: confgate-research-graph
services:
  confgate-research-graph:
    image: neo4j:5.26-community
    container_name: confgate-research-graph
    restart: unless-stopped
    ports:
      - "7689:7687"   # bolt  (dev host port 7689 -> container 7687)
      - "7476:7474"   # http  (dev host port 7476 -> container 7474)
    environment:
      # NEO4J_AUTH is read from .env (gitignored). Falls back to a dev default
      # only so `docker compose config` doesn't error when .env is absent.
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-confgate_graph_dev}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - confgate_graph_data:/data
      - confgate_graph_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_USER:-neo4j} -p $${NEO4J_PASSWORD:-confgate_graph_dev} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

volumes:
  confgate_graph_data:
  confgate_graph_logs:
