name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ---- Unit tier: Docker-free. Existing package suite + packaging guard + ruff. ----
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build
      - name: Unit tests + lint (make test)
        run: make test

  # ---- Integration tier: live Neo4j service containers (Gap 4: two separate ----
  # ---- instances — Community Edition is single-DB, so the link-forge stand-in ----
  # ---- is its OWN container, never a second DB). ----
  integration:
    runs-on: ubuntu-latest
    services:
      neo4j-main:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/ci_test_password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p ci_test_password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s
      neo4j-linkforge:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/ci_linkforge_password
        ports:
          - 7688:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p ci_linkforge_password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s
    env:
      CONFGATE_TEST_BOLT_URL: bolt://localhost:7687
      CONFGATE_TEST_USER: neo4j
      CONFGATE_TEST_PASSWORD: ci_test_password
      # Phase 1+ link-forge stand-in (second container):
      LINK_FORGE_TEST_BOLT_URL: bolt://localhost:7688
      LINK_FORGE_TEST_USER: neo4j
      LINK_FORGE_TEST_PASSWORD: ci_linkforge_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r research-graph/requirements.txt
      - name: Integration tests (pytest -m integration)
        run: make test-int-ci
